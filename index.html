<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viu Generator • Premium Accounts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root[data-theme="dark"] {
            --bg: #0a0a0f;
            --card-bg: #16161f;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a35;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.3);
            --terminal-bg: #0d0d14;
            --terminal-text: #00ffaa;
        }

        :root[data-theme="light"] {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #4a4a5e;
            --border: #e0e0e8;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.2);
            --terminal-bg: #f8fafc;
            --terminal-text: #0a3a2e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s, color 0.3s;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Aurora Background */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.5;
            filter: blur(100px);
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
        }

        .a1 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            top: -250px;
            left: -250px;
            animation: aurora 15s infinite alternate;
        }

        .a2 {
            width: 600px;
            height: 600px;
            background: #3b82f6;
            bottom: -300px;
            right: -300px;
            animation: aurora 20s infinite alternate-reverse;
        }

        .a3 {
            width: 400px;
            height: 400px;
            background: #ec4899;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: aurora 25s infinite alternate;
        }

        @keyframes aurora {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.2); }
        }

        .page-wrapper {
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Login Gate */
        .login-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: scaleIn 0.5s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .login-title {
            font-size: 32px;
            font-weight: 800;
            margin: 20px 0 8px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .login-hint {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 20px;
            opacity: 0.7;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .logo-icon svg {
            width: 30px;
            height: 30px;
            color: white;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, button {
            font-family: 'Inter', sans-serif;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            padding-right: 50px;
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .eye-btn:hover {
            color: var(--accent);
        }

        .stepper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stepper input {
            text-align: center;
            font-weight: 700;
            font-size: 20px;
        }

        .stepper-btn {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--text);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stepper-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        button:not(.stepper-btn):not(.eye-btn):not(.theme-toggle) {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 2px solid transparent;
        }

        button:not(.stepper-btn):not(.eye-btn):not(.theme-toggle):hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.5);
            border-color: white;
        }

        .result-card {
            padding: 0;
            overflow: hidden;
        }

        .terminal-titlebar {
            background: var(--bg);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .term-dots {
            display: flex;
            gap: 8px;
        }

        .tdot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .tdot.red { background: #ff5f56; }
        .tdot.yellow { background: #ffbd2e; }
        .tdot.green { background: #27c93f; }

        .term-title {
            flex: 1;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .result-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .terminal-body {
            background: var(--terminal-bg);
            padding: 25px;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        .term-prompt {
            display: block;
            margin-bottom: 15px;
            color: var(--terminal-text);
            font-size: 14px;
        }

        .term-cmd {
            color: var(--accent);
        }

        .result-output {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--terminal-text);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            resize: none;
            outline: none;
            min-height: 200px;
        }

        .term-cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: var(--terminal-text);
            animation: blink 1s infinite;
            opacity: 0.5;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .term-loading-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            margin: 10px 0;
            border-radius: 2px;
            overflow: hidden;
        }

        .term-loading-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ec4899);
            width: 0%;
            transition: width 0.3s;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            z-index: 1000;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: var(--text);
        }

        .theme-toggle:hover {
            transform: rotate(15deg);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #7c3aed, #ec4899, #7c3aed);
            width: 0%;
            transition: width 0.3s;
            z-index: 9999;
            box-shadow: 0 0 20px #7c3aed;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-size: 14px;
        }

        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-warning { background: #f59e0b; }
        .toast-info { background: #3b82f6; }

        .toast.fade-out {
            animation: slideOut 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Confetti Canvas */
        .confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
        }

        .hidden {
            display: none !important;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ec4899;
        }
    </style>
</head>
<body>
    <!-- Progress Bar -->
    <div id="progressBar" class="progress-bar hidden"></div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas" class="confetti-canvas"></canvas>

    <!-- Aurora Background -->
    <div class="aurora-bg">
        <div class="aurora-blob a1"></div>
        <div class="aurora-blob a2"></div>
        <div class="aurora-blob a3"></div>
    </div>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-toggle" title="Toggle theme">
        <span id="themeIcon">☀️</span>
    </button>

    <!-- Login Gate -->
    <div id="loginGate" class="login-gate">
        <div class="login-card">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
            </div>
            <h2 class="login-title">Viu Generator</h2>
            <p class="login-sub">Masukkan Telegram User ID Anda untuk melanjutkan</p>
            <div class="field-group">
                <label for="telegramIdInput">Telegram User ID</label>
                <input type="number" id="telegramIdInput" placeholder="Contoh: 1234567890">
            </div>
            <button id="loginBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                Masuk
            </button>
            <p class="login-hint">ID tidak terdaftar? Hubungi admin.</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="page-wrapper hidden">
        <header>
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
            </div>
            <h1>Viu Generator</h1>
            <p class="tagline">Generate premium accounts in one click</p>
        </header>

        <div class="card">
            <div class="field-group">
                <label for="passwordInput">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="passwordInput" placeholder="Enter your password..." value="Bintang31">
                    <button type="button" id="toggleVisibility" class="eye-btn" title="Show/Hide password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="field-group">
                <label for="accountCount">Jumlah Akun (maks. 5)</label>
                <div class="stepper">
                    <button type="button" class="stepper-btn" id="decrementBtn">−</button>
                    <input type="number" id="accountCount" value="1" min="1" max="5" readonly>
                    <button type="button" class="stepper-btn" id="incrementBtn">+</button>
                </div>
            </div>
            <button id="generateBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                Generate Premium Accounts
            </button>
        </div>

        <div id="resultCard" class="card result-card">
            <div class="terminal-titlebar">
                <div class="term-dots">
                    <span class="tdot red"></span>
                    <span class="tdot yellow"></span>
                    <span class="tdot green"></span>
                </div>
                <span class="term-title">Viu Generator — Output</span>
                <div class="result-actions">
                    <button class="action-btn" id="copyAllBtn" title="Copy All">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy
                    </button>
                    <button class="action-btn export-btn" id="exportBtn" title="Export to TXT">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Export
                    </button>
                </div>
            </div>
            <div id="termLoadingBar" class="term-loading-bar hidden">
                <div class="term-loading-fill" id="termLoadingFill"></div>
            </div>
            <div class="terminal-body">
                <span class="term-prompt">C:\ViuGen&gt; <span class="term-cmd" id="termPrompt">waiting for input...</span></span>
                <textarea id="combinedResult" class="result-output" readonly placeholder="Generated accounts will appear here..."></textarea>
                <span class="term-cursor">█</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== CONFIG ====================
            const VALID_TELEGRAM_IDS = [123456789, 987654321, 310808]; // Tambahin ID lu di sini

            // ==================== DOM ELEMENTS ====================
            const html = document.documentElement;
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const loginGate = document.getElementById('loginGate');
            const mainApp = document.getElementById('mainApp');
            const telegramIdInput = document.getElementById('telegramIdInput');
            const loginBtn = document.getElementById('loginBtn');
            const passwordInput = document.getElementById('passwordInput');
            const toggleVisibility = document.getElementById('toggleVisibility');
            const eyeIcon = toggleVisibility.querySelector('svg');
            const accountCount = document.getElementById('accountCount');
            const decrementBtn = document.getElementById('decrementBtn');
            const incrementBtn = document.getElementById('incrementBtn');
            const generateBtn = document.getElementById('generateBtn');
            const combinedResult = document.getElementById('combinedResult');
            const termPrompt = document.getElementById('termPrompt');
            const termLoadingBar = document.getElementById('termLoadingBar');
            const termLoadingFill = document.getElementById('termLoadingFill');
            const progressBar = document.getElementById('progressBar');
            const copyAllBtn = document.getElementById('copyAllBtn');
            const exportBtn = document.getElementById('exportBtn');
            const toastContainer = document.getElementById('toastContainer');
            
            // Confetti
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            let animationId = null;
            let particles = [];

            // ==================== THEME ====================
            const savedTheme = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', savedTheme);
            themeIcon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

            themeToggle.addEventListener('click', () => {
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeIcon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
                
                showToast(`Theme changed to ${newTheme} mode`, 'info');
            });

            // ==================== LOGIN ====================
            loginBtn.addEventListener('click', () => {
                const userId = parseInt(telegramIdInput.value.trim());
                
                if (!userId) {
                    showToast('Masukkan Telegram User ID!', 'error');
                    return;
                }
                
                if (VALID_TELEGRAM_IDS.includes(userId)) {
                    loginGate.classList.add('hidden');
                    mainApp.classList.remove('hidden');
                    showToast('Login berhasil! Selamat datang.', 'success');
                    
                    startConfetti();
                    setTimeout(stopConfetti, 3000);
                } else {
                    showToast('Telegram ID tidak terdaftar! Hubungi admin.', 'error');
                }
            });

            telegramIdInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loginBtn.click();
            });

            // ==================== PASSWORD VISIBILITY ====================
            toggleVisibility.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if (type === 'text') {
                    eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle><line x1="1" y1="1" x2="23" y2="23"></line>';
                } else {
                    eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                }
            });

            // ==================== STEPPER ====================
            decrementBtn.addEventListener('click', () => {
                let val = parseInt(accountCount.value);
                if (val > 1) accountCount.value = val - 1;
            });

            incrementBtn.addEventListener('click', () => {
                let val = parseInt(accountCount.value);
                if (val < 5) accountCount.value = val + 1;
            });

            // ==================== GENERATE ====================
            generateBtn.addEventListener('click', async () => {
                const password = passwordInput.value.trim();
                const jumlah = parseInt(accountCount.value);
                
                if (!password) {
                    showToast('Password tidak boleh kosong!', 'error');
                    return;
                }
                
                termPrompt.textContent = `generating ${jumlah} account(s)...`;
                termLoadingBar.classList.remove('hidden');
                progressBar.classList.remove('hidden');
                combinedResult.value = '';
                
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 5;
                    termLoadingFill.style.width = progress + '%';
                    progressBar.style.width = progress + '%';
                    if (progress >= 100) clearInterval(interval);
                }, 100);
                
                const accounts = [];
                for (let i = 1; i <= jumlah; i++) {
                    const username = generateUsername();
                    const email = generateEmail(username);
                    
                    accounts.push({ username, email, password });
                    
                    combinedResult.value += `[AKUN ${i}]\n`;
                    combinedResult.value += `Username: ${username}\n`;
                    combinedResult.value += `Email: ${email}\n`;
                    combinedResult.value += `Password: ${password}\n`;
                    combinedResult.value += `Status: PREMIUM VIU\n`;
                    combinedResult.value += `Expired: 7 days from now\n`;
                    combinedResult.value += `-`.repeat(40) + '\n\n';
                    
                    combinedResult.scrollTop = combinedResult.scrollHeight;
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
                
                clearInterval(interval);
                termLoadingFill.style.width = '100%';
                progressBar.style.width = '100%';
                
                setTimeout(() => {
                    termLoadingBar.classList.add('hidden');
                    progressBar.classList.add('hidden');
                    termPrompt.textContent = 'generation complete!';
                    showToast(`Berhasil generate ${jumlah} akun!`, 'success');
                    startConfetti();
                    setTimeout(stopConfetti, 2000);
                }, 500);
                
                localStorage.setItem('lastAccounts', JSON.stringify(accounts));
            });

            function generateUsername() {
                const prefixes = ['viu', 'premium', 'user', 'stream', 'movie', 'drama', 'series', 'bintang', 'gold', 'platinum'];
                const rand = Math.floor(Math.random() * 10000);
                return prefixes[Math.floor(Math.random() * prefixes.length)] + rand;
            }

            function generateEmail(username) {
                const domains = ['@gmail.com', '@yahoo.com', '@outlook.com', '@viu.premium', '@inbox.com', '@mail.com'];
                const domain = domains[Math.floor(Math.random() * domains.length)];
                return username + domain;
            }

            // ==================== COPY ALL ====================
            copyAllBtn.addEventListener('click', () => {
                if (!combinedResult.value) {
                    showToast('Tidak ada data untuk di-copy!', 'warning');
                    return;
                }
                navigator.clipboard.writeText(combinedResult.value);
                showToast('Semua data berhasil di-copy!', 'success');
            });

            // ==================== EXPORT ====================
            exportBtn.addEventListener('click', () => {
                if (!combinedResult.value) {
                    showToast('Tidak ada data untuk di-export!', 'warning');
                    return;
                }
                
                const blob = new Blob([combinedResult.value], { type: 'text/plain' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `viu_accounts_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
                a.click();
                window.URL.revokeObjectURL(url);
                
                showToast('Data berhasil di-export!', 'success');
            });

            // ==================== TOAST ====================
            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = message;
                toastContainer.appendChild(toast);
                
                setTimeout(() => {
                    toast.classList.add('fade-out');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            // ==================== CONFETTI ====================
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            function startConfetti() {
                particles = [];
                for (let i = 0; i < 100; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height * 0.5,
                        vx: (Math.random() - 0.5) * 8,
                        vy: Math.random() * 3 + 2,
                        size: Math.random() * 5 + 3,
                        color: `hsl(${Math.random() * 360}, 70%, 60%)`
                    });
                }
                
                if (animationId) cancelAnimationFrame(animationId);
                animateConfetti();
            }
            
            function animateConfetti() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let anyAlive = false;
                
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    
                    if (p.y < canvas.height) {
                        anyAlive = true;
                        ctx.fillStyle = p.color;
                        ctx.fillRect(p.x, p.y, p.size, p.size);
                    }
                });
                
                if (anyAlive) {
                    animationId = requestAnimationFrame(animateConfetti);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            
            function stopConfetti() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }

            // ==================== ENTER KEY ====================
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') generateBtn.click();
            });

            // ==================== INITIAL CHECK ====================
            // Auto-hide login if already logged in (for demo, always show login)
            loginGate.classList.remove('hidden');
            mainApp.classList.add('hidden');
        })();
    </script>
</body>
</html>
